# HTTP → HTTPS redirect
server {
    listen 80;
    server_name imgpact.com www.imgpact.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name imgpact.com www.imgpact.com;

    ssl_certificate     /etc/letsencrypt/live/imgpact.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/imgpact.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/wasm image/svg+xml;
    gzip_min_length 1024;

    # Security headers (Axum also sets COOP/COEP)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static files served directly by Nginx (bypasses Axum)
    location /static/ {
        alias /app/static/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Cross-Origin-Resource-Policy "cross-origin";

        # Required for WASM SharedArrayBuffer
        add_header Cross-Origin-Opener-Policy "same-origin";
        add_header Cross-Origin-Embedder-Policy "require-corp";

        gzip_static on;
        access_log off;
    }

    # Proxy everything else to Axum
    location / {
        proxy_pass         http://imgpact:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffer_size  128k;
        proxy_buffers      4 256k;
        client_max_body_size 210M;
    }
}
